<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>البحث عن الدرجات</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      margin-top: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .muted { color: #666; margin-bottom: 20px; }
    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1;
      min-width: 260px;
      padding: 14px 16px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 16px;
      direction: ltr;
    }
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1558bc; }
    .note {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      margin-top: 24px;
    }
    .student-name {
      font-size: 26px;
      margin: 0 0 10px;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
      gap: 10px;
      margin: 16px 0 20px;
    }
    .meta div {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .section-title {
      font-size: 20px;
      margin: 18px 0 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      overflow: hidden;
      border-radius: 12px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eceff3;
      text-align: right;
      font-size: 14px;
    }
    th {
      background: #f8fafc;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: none; }
    .overall {
      margin-top: 18px;
      background: #eef6ff;
      border: 1px solid #cfe2ff;
      padding: 16px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    .error {
      margin-top: 20px;
      background: #fff4f4;
      border: 1px solid #ffcccc;
      color: #8a1c1c;
      padding: 14px 16px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>البحث عن الدرجات</h1>
      <div class="muted">البحث يعتمد على عمود <b>code</b> فقط.</div>
      <div class="search-row">
        <input type="text" id="codeInput" placeholder="اكتب code هنا" />
        <button onclick="searchStudent()">بحث</button>
      </div>
      <div class="note">الخلايا الفارغة يتم عرضها على شكل 0.</div>
    </div>

    <div id="result"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const subjectOrder = [
      "islamic","arabic","english","math","physics",
      "chemistry","biology","social","ethics","sport","art"
    ];

    const metricOrder = [
      "first_term","midyear","second_term","coursework",
      "final_exam","final_grade","second_round","final_total"
    ];

    function getLabel(key) {
      return labels[key] || key;
    }

    function buildSubjectRows(student, subject) {
      return metricOrder.map(metric => {
        const key = `${subject}_${metric}`;
        return {
          key,
          label: getLabel(key),
          value: key in student ? student[key] : 0
        };
      });
    }

    function normalizeValue(v) {
      if (v === null || v === undefined || String(v).trim() === "") return 0;
      return v;
    }

    function searchStudent() {
      const code = document.getElementById("codeInput").value.trim();
      const result = document.getElementById("result");
      result.innerHTML = "";

      const student = data.find(item => String(item.code).trim() === code);

      if (!student) {
        result.innerHTML = '<div class="error">لم يتم العثور على طالب بهذا الـ code.</div>';
        return;
      }

      let html = `
        <div class="card">
          <h2 class="student-name">${student.name || ""}</h2>
          <div class="meta">
            <div><strong>${getLabel("code")}:</strong> ${normalizeValue(student.code)}</div>
            <div><strong>${getLabel("record_no")}:</strong> ${normalizeValue(student.record_no)}</div>
            <div><strong>${getLabel("grade")}:</strong> ${normalizeValue(student.grade)}</div>
            <div><strong>${getLabel("section")}:</strong> ${normalizeValue(student.section)}</div>
          </div>
      `;

      subjectOrder.forEach(subject => {
        const subjectRows = buildSubjectRows(student, subject);
        const title = subjectRows.length ? subjectRows[0].label.split(" - ")[0] : subject;
        html += `
          <div class="section-title">${title}</div>
          <table>
            <thead>
              <tr>
                <th>البند</th>
                <th>الدرجة</th>
              </tr>
            </thead>
            <tbody>
        `;
        subjectRows.forEach(row => {
          const label = row.label.includes(" - ") ? row.label.split(" - ")[1] : row.label;
          html += `<tr><td>${label}</td><td>${normalizeValue(row.value)}</td></tr>`;
        });
        html += `</tbody></table>`;
      });

      html += `<div class="overall">${getLabel("overall")}: ${normalizeValue(student.overall)}</div>`;
      html += `</div>`;

      result.innerHTML = html;
    }

    document.getElementById("codeInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") searchStudent();
    });
  </script>
</body>
</html>
