<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الطلاب</title>
  <style>
    body {
      font-family: Tahoma;
      background: #f5f7fb;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .title {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .stages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stage {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      text-align: center;
      cursor: pointer;
    }

    .stage.active {
      background: #2563eb;
      color: white;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
    }

    .error {
      background: #fee2e2;
      color: red;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: none;
    }

    .card h2 {
      text-align: center;
    }

    .grades {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .grade {
      background: #eff6ff;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="box">
    <div class="title">اختر المرحلة الدراسية</div>

    <div class="stages">
      <div class="stage" onclick="setStage(this,'grade1')">الأول المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade2')">الثاني المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade3')">الثالث المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade4s')">الرابع العلمي</div>
      <div class="stage" onclick="setStage(this,'grade4a')">الرابع الأدبي</div>
      <div class="stage" onclick="setStage(this,'grade5s')">الخامس العلمي</div>
      <div class="stage" onclick="setStage(this,'grade5a')">الخامس الأدبي</div>
      <div class="stage" onclick="setStage(this,'grade6s')">السادس العلمي</div>
      <div class="stage" onclick="setStage(this,'grade6a')">السادس الأدبي</div>
    </div>
  </div>

  <div class="box">
    <input id="code" placeholder="ادخل الرقم السري">
    <button onclick="search()">بحث</button>
    <div id="error"></div>
  </div>

  <div id="card" class="card">
    <h2 id="name"></h2>
    <div id="grades" class="grades"></div>
  </div>

</div>

<script>
let stage = "";
let data = [];

function cleanObject(obj) {
  const newObj = {};
  Object.keys(obj).forEach(key => {
    newObj[String(key).trim()] = obj[key];
  });
  return newObj;
}

function setStage(el, s) {
  document.querySelectorAll(".stage").forEach(x => x.classList.remove("active"));
  el.classList.add("active");
  stage = s;
  loadData();
}

async function loadData() {
  try {
    document.getElementById("error").innerHTML = "جاري التحميل...";

    const res = await fetch(`/grade/${stage}/grades.json?t=${Date.now()}`);

    if (!res.ok) throw "error";

    const rawData = await res.json();
    data = rawData.map(cleanObject);

    document.getElementById("error").innerHTML = "";
  } catch {
    document.getElementById("error").innerHTML = "صار خطأ أثناء تحميل البيانات";
  }
}

function search() {
  const code = document.getElementById("code").value.trim();

  if (!stage) {
    document.getElementById("error").innerHTML = "اختر المرحلة أولاً";
    return;
  }

  const student = data.find(x => String(x["الرقم السري"]).trim() === code);

  if (!student) {
    document.getElementById("error").innerHTML = "لم يتم العثور على الطالب";
    document.getElementById("card").style.display = "none";
    return;
  }

  document.getElementById("error").innerHTML = "";
  document.getElementById("name").innerText = student["اسم الطالب"] || "";

  const grades = document.getElementById("grades");
  grades.innerHTML = "";

  Object.keys(student).forEach(k => {
    if (
      k === "اسم الطالب" ||
      k === "الرقم السري" ||
      k === "رقم القيد" ||
      k === "الصف" ||
      k === "الشعبة"
    ) return;

    const div = document.createElement("div");
    div.className = "grade";
    div.innerHTML = `<b>${k}</b><br>${student[k] ?? ""}`;
    grades.appendChild(div);
  });

  document.getElementById("card").style.display = "block";
}
</script>

</body>
</html>
