<script>

let stage = "";
let data = [];

/* تنظيف النص */
function cleanText(v){
  return String(v ?? "")
    .replace(/\u200F|\u200E/g, "") // حذف RTL
    .replace(/\s+/g, " ")          // توحيد الفراغات
    .trim();
}

/* تنظيف كل البيانات */
function cleanObject(obj){
  const newObj = {};
  Object.keys(obj).forEach(key => {
    const cleanKey = cleanText(key);
    newObj[cleanKey] = cleanText(obj[key]);
  });
  return newObj;
}

/* إيجاد المفتاح الصحيح حتى لو الاسم مختلف */
function findKey(obj, possibleKeys){
  const keys = Object.keys(obj);

  for(let p of possibleKeys){
    for(let k of keys){
      if(cleanText(k) === cleanText(p)){
        return k;
      }
    }
  }
  return null;
}

/* اختيار المرحلة */
function setStage(el, s){
  document.querySelectorAll(".stage").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  stage = s;
  loadData();
}

/* تحميل البيانات */
async function loadData(){
  try{
    document.getElementById("error").innerHTML = "جاري التحميل...";

    const res = await fetch(`/grade/${stage}/grades.json?t=${Date.now()}`);

    if(!res.ok) throw "error";

    const raw = await res.json();
    data = raw.map(cleanObject);

    document.getElementById("error").innerHTML = "";

  }catch{
    document.getElementById("error").innerHTML = "صار خطأ أثناء تحميل البيانات";
  }
}

/* البحث */
function search(){

  const codeInput = cleanText(document.getElementById("code").value);

  if(!stage){
    document.getElementById("error").innerHTML = "اختر المرحلة أولاً";
    return;
  }

  let student = null;

  for(let s of data){

    const codeKey = findKey(s, [
      "الرقم السري",
      "رقم الطالب",
      "code",
      "id"
    ]);

    if(!codeKey) continue;

    if(cleanText(s[codeKey]) === codeInput){
      student = s;
      break;
    }
  }

  if(!student){
    document.getElementById("error").innerHTML = "الطالب غير موجود";
    document.getElementById("card").style.display = "none";
    return;
  }

  document.getElementById("error").innerHTML = "";

  const nameKey = findKey(student, ["اسم الطالب","name"]);
  const gradeKey = findKey(student, ["الصف"]);
  const sectionKey = findKey(student, ["الشعبة"]);

  document.getElementById("name").innerText = student[nameKey] || "";

  const grades = document.getElementById("grades");
  grades.innerHTML = "";

  Object.keys(student).forEach(k=>{

    if([
      nameKey,
      gradeKey,
      sectionKey,
      findKey(student,["الرقم السري","code"]),
      "رقم القيد"
    ].includes(k)) return;

    const div = document.createElement("div");
    div.className = "grade";
    div.innerHTML = `<b>${k}</b><br>${student[k]}`;
    grades.appendChild(div);

  });

  document.getElementById("card").style.display = "block";
}

</script>
