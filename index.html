<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الطلاب</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
      color: #1f2937;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 950px;
      margin: 25px auto;
    }

    .header {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
      padding: 28px 22px;
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      color: #475569;
      line-height: 1.9;
      font-size: 16px;
    }

    .stages-box, .search-box, .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
      padding: 22px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #0f172a;
      text-align: center;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .stage-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 16px;
      padding: 16px 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .stage-btn:hover {
      background: #eff6ff;
      border-color: #60a5fa;
    }

    .stage-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .selected-stage {
      margin-top: 16px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px dashed #60a5fa;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      font-weight: bold;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 17px;
      margin-bottom: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .search-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      font-weight: bold;
    }

    .search-btn:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 15px;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.9;
      display: none;
      white-space: pre-wrap;
      text-align: center;
    }

    .status.show { display: block; }

    .status.info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .status.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
    }

    .card {
      display: none;
      overflow: hidden;
      padding: 0;
    }

    .card.show { display: block; }

    .card-top {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    .card-top h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .card-top p {
      margin: 0;
      font-size: 16px;
    }

    .card-body {
      padding: 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .info-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px;
    }

    .info-item .label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 18px;
      font-weight: bold;
      color: #0f172a;
      word-break: break-word;
    }

    .grades-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .grades-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .grade-item {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }

    .grade-item .subject {
      font-size: 15px;
      color: #1e3a8a;
      margin-bottom: 6px;
    }

    .grade-item .score {
      font-size: 24px;
      font-weight: bold;
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>نتائج الطلاب</h1>
      <p>اختر المرحلة الدراسية أولاً، ثم اكتب الرقم السري واضغط بحث.</p>
    </div>

    <div class="stages-box">
      <div class="section-title">اختر المرحلة الدراسية</div>

      <div class="stage-grid">
        <button type="button" class="stage-btn" data-path="grade1" data-name="الأول المتوسط">الأول المتوسط</button>
        <button type="button" class="stage-btn" data-path="grade2" data-name="الثاني المتوسط">الثاني المتوسط</button>
        <button type="button" class="stage-btn" data-path="grade3" data-name="الثالث المتوسط">الثالث المتوسط</button>
        <button type="button" class="stage-btn" data-path="grade4s" data-name="الرابع العلمي">الرابع العلمي</button>
        <button type="button" class="stage-btn" data-path="grade4a" data-name="الرابع الأدبي">الرابع الأدبي</button>
        <button type="button" class="stage-btn" data-path="grade5s" data-name="الخامس العلمي">الخامس العلمي</button>
        <button type="button" class="stage-btn" data-path="grade5a" data-name="الخامس الأدبي">الخامس الأدبي</button>
        <button type="button" class="stage-btn" data-path="grade6s" data-name="السادس العلمي">السادس العلمي</button>
        <button type="button" class="stage-btn" data-path="grade6a" data-name="السادس الأدبي">السادس الأدبي</button>
      </div>

      <div id="selectedStageBox" class="selected-stage">لم يتم اختيار مرحلة بعد.</div>
    </div>

    <div class="search-box">
      <label for="studentCode">الرقم السري</label>
      <input type="text" id="studentCode" placeholder="اكتب الرقم السري هنا" />
      <button class="search-btn" onclick="searchStudent()">بحث</button>
      <div id="statusMessage" class="status"></div>
    </div>

    <div id="resultCard" class="card">
      <div class="card-top">
        <h2 id="studentName">اسم الطالب</h2>
        <p id="studentStage">المرحلة الدراسية</p>
      </div>

      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <div class="label">الرقم السري</div>
            <div class="value" id="studentCodeValue">-</div>
          </div>

          <div class="info-item">
            <div class="label">اسم الطالب</div>
            <div class="value" id="studentNameValue">-</div>
          </div>

          <div class="info-item">
            <div class="label">الصف</div>
            <div class="value" id="studentGradeValue">-</div>
          </div>

          <div class="info-item">
            <div class="label">الشعبة</div>
            <div class="value" id="studentSectionValue">-</div>
          </div>
        </div>

        <div class="grades-title">الدرجات</div>
        <div id="gradesList" class="grades-list"></div>
      </div>
    </div>
  </div>

  <script>
    let selectedStagePath = "";
    let selectedStageName = "";
    let studentsData = [];

    const stageButtons = document.querySelectorAll(".stage-btn");

    stageButtons.forEach(button => {
      button.addEventListener("click", async function () {
        stageButtons.forEach(btn => btn.classList.remove("active"));
        this.classList.add("active");

        selectedStagePath = this.dataset.path;
        selectedStageName = this.dataset.name;

        document.getElementById("selectedStageBox").textContent =
          "المرحلة المختارة: " + selectedStageName;

        hideCard();
        setStatus("info", "جاري تحميل بيانات " + selectedStageName + "...");
        await loadStageData();
      });
    });

    function setStatus(type, message) {
      const box = document.getElementById("statusMessage");
      box.className = "status show " + type;
      box.textContent = message;
    }

    function hideStatus() {
      const box = document.getElementById("statusMessage");
      box.className = "status";
      box.textContent = "";
    }

    function hideCard() {
      document.getElementById("resultCard").classList.remove("show");
    }

    async function loadStageData() {
      try {
        const response = await fetch(`${selectedStagePath}/grades.json?t=${Date.now()}`);
        if (!response.ok) {
          throw new Error("load error");
        }

        studentsData = await response.json();
        hideStatus();
      } catch (error) {
        studentsData = [];
        setStatus("error", "صار خطأ أثناء تحميل بيانات المرحلة المختارة.");
      }
    }

    function searchStudent() {
      hideCard();
      hideStatus();

      const codeInput = document.getElementById("studentCode").value.trim();

      if (!selectedStagePath) {
        setStatus("error", "يرجى اختيار المرحلة أولاً.");
        return;
      }

      if (!codeInput) {
        setStatus("error", "يرجى إدخال الرقم السري.");
        return;
      }

      if (!studentsData || studentsData.length === 0) {
        setStatus("error", "بيانات المرحلة غير جاهزة حالياً.");
        return;
      }

      const student = studentsData.find(item =>
        String(item["الرقم السري"]).trim() === codeInput
      );

      if (!student) {
        setStatus("error", "لم يتم العثور على طالب بهذا الرقم السري في المرحلة المختارة.");
        return;
      }

      showStudentCard(student);
    }

    function showStudentCard(student) {
      document.getElementById("studentName").textContent = student["اسم الطالب"] || "بدون اسم";
      document.getElementById("studentStage").textContent = selectedStageName;
      document.getElementById("studentCodeValue").textContent = student["الرقم السري"] || "-";
      document.getElementById("studentNameValue").textContent = student["اسم الطالب"] || "-";
      document.getElementById("studentGradeValue").textContent = student["الصف"] || "-";
      document.getElementById("studentSectionValue").textContent = student["الشعبة"] || "-";

      const gradesList = document.getElementById("gradesList");
      gradesList.innerHTML = "";

      Object.keys(student).forEach(key => {
        if (
          key === "رقم القيد" ||
          key === "الرقم السري" ||
          key === "اسم الطالب" ||
          key === "الصف" ||
          key === "الشعبة"
        ) {
          return;
        }

        const value = student[key];

        const item = document.createElement("div");
        item.className = "grade-item";
        item.innerHTML = `
          <div class="subject">${key}</div>
          <div class="score">${value}</div>
        `;
        gradesList.appendChild(item);
      });

      document.getElementById("resultCard").classList.add("show");
    }

    document.getElementById("studentCode").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        searchStudent();
      }
    });
  </script>
</body>
</html>
