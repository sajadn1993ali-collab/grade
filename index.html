<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار نتائج الطلاب</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }
    .box {
      max-width: 800px;
      margin: 20px auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      margin-top: 0;
    }
    .stages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    .stage {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: #fff;
    }
    .stage.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    input {
      border: 1px solid #ccc;
    }
    button {
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #msg {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
      color: #b91c1c;
      min-height: 24px;
      white-space: pre-wrap;
    }
    #result {
      margin-top: 20px;
      display: none;
      border-top: 1px solid #ddd;
      padding-top: 15px;
    }
    .row {
      margin-bottom: 8px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>ثانوية المنتظر</h1>

    <div class="stages">
      <div class="stage" onclick="setStage(this,'grade1')">الأول المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade2')">الثاني المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade3')">الثالث المتوسط</div>
      <div class="stage" onclick="setStage(this,'grade4s')">الرابع العلمي</div>
      <div class="stage" onclick="setStage(this,'grade4a')">الرابع الأدبي</div>
      <div class="stage" onclick="setStage(this,'grade5s')">الخامس العلمي</div>
      <div class="stage" onclick="setStage(this,'grade5a')">الخامس الأدبي</div>
      <div class="stage" onclick="setStage(this,'grade6s')">السادس العلمي</div>
      <div class="stage" onclick="setStage(this,'grade6a')">السادس الأدبي</div>
    </div>

    <input id="code" placeholder="ادخل الرقم السري" />
    <button onclick="searchStudent()">بحث</button>

    <div id="msg"></div>

    <div id="result">
      <div class="row"><b>اسم الطالب:</b> <span id="studentName"></span></div>
      <div class="row"><b>الرقم السري:</b> <span id="studentSecret"></span></div>
      <div class="row"><b>الصف:</b> <span id="studentGrade"></span></div>
      <div class="row"><b>الشعبة:</b> <span id="studentSection"></span></div>
    </div>
  </div>

  <script>
    let selectedStage = "";
    let students = [];

    function cleanText(v) {
      return String(v ?? "")
        .replace(/\u200F|\u200E/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanObject(obj) {
      const out = {};
      Object.keys(obj).forEach((k) => {
        out[cleanText(k)] = typeof obj[k] === "string" ? cleanText(obj[k]) : obj[k];
      });
      return out;
    }

    async function setStage(el, stage) {
      document.querySelectorAll(".stage").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      selectedStage = stage;
      document.getElementById("result").style.display = "none";
      document.getElementById("msg").textContent = "جاري تحميل البيانات...";

      try {
        const res = await fetch(`/grade/${stage}/grades.json?t=${Date.now()}`);
        if (!res.ok) throw new Error("load failed");
        const raw = await res.json();
        students = raw.map(cleanObject);
        document.getElementById("msg").textContent = "تم تحميل البيانات";
      } catch (e) {
        students = [];
        document.getElementById("msg").textContent = "صار خطأ أثناء تحميل البيانات";
      }
    }

    function searchStudent() {
      const code = cleanText(document.getElementById("code").value);

      if (!selectedStage) {
        document.getElementById("msg").textContent = "اختر المرحلة أولاً";
        return;
      }

      if (!code) {
        document.getElementById("msg").textContent = "ادخل الرقم السري";
        return;
      }

      const student = students.find(s => cleanText(s["الرقم السري"]) === code);

      if (!student) {
        document.getElementById("result").style.display = "none";
        document.getElementById("msg").textContent = "الطالب غير موجود";
        return;
      }

      document.getElementById("msg").textContent = "";
      document.getElementById("studentName").textContent = student["اسم الطالب"] || "";
      document.getElementById("studentSecret").textContent = student["الرقم السري"] || "";
      document.getElementById("studentGrade").textContent = student["الصف"] || "";
      document.getElementById("studentSection").textContent = student["الشعبة"] || "";
      document.getElementById("result").style.display = "block";
    }
  </script>

</body>
</html>
